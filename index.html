<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary Meta Tags ── -->
    <title>Akino Studio — Video Production Agency | Brand Films, Social Shorts & Campaign Videos</title>
    <meta name="title" content="Akino Studio — Video Production Agency | Brand Films, Social Shorts & Campaign Videos" />
    <meta name="description" content="Akino Studio is a video production agency specialising in brand films, social media shorts, and campaign videos. Over 1,000 videos produced. Let's create content that cuts through the noise." />
    <meta name="keywords" content="video production agency, brand films, social media video, campaign videos, video editing, content creation, storytelling, scripting, video marketing, Akino Studio" />
    <meta name="author" content="Akino Studio" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://akinostudio.com/" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />

    <!-- ── Open Graph / Facebook ── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://akinostudio.com/" />
    <meta property="og:title" content="Akino Studio — Video Production Agency" />
    <meta property="og:description" content="Brand films. Social shorts. Campaign videos. We create content that cuts through the noise. Over 1,000 videos produced in 3 years." />
    <meta property="og:image" content="https://akinostudio.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:site_name" content="Akino Studio" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://akinostudio.com/" />
    <meta name="twitter:title" content="Akino Studio — Video Production Agency" />
    <meta name="twitter:description" content="Brand films. Social shorts. Campaign videos. We create content that cuts through the noise." />
    <meta name="twitter:image" content="https://akinostudio.com/og-image.png" />

    <!-- ── Structured Data — Organization ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoProductionCompany",
      "name": "Akino Studio",
      "url": "https://akinostudio.com",
      "logo": "https://akinostudio.com/logo.svg",
      "description": "Akino Studio is a video production agency specialising in brand films, social media shorts, and campaign videos.",
      "foundingDate": "2023",
      "sameAs": [
        "https://www.linkedin.com/company/akinostudio",
        "https://instagram.com/studio.akino",
        "https://www.youtube.com/@AkinoStudio",
        "https://www.tiktok.com/@akinostudio"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "url": "https://akinostudio.com/#contact"
      },
      "knowsAbout": [
        "Video Production",
        "Brand Films",
        "Social Media Content",
        "Campaign Videos",
        "Video Editing",
        "Storytelling",
        "Scripting"
      ]
    }
    </script>

    <!-- ── Structured Data — WebSite (enables Google Sitelinks) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Akino Studio",
      "url": "https://akinostudio.com",
      "potentialAction": {
        "@type": "ReadAction",
        "target": "https://akinostudio.com"
      }
    }
    </script>

    <!-- ── Structured Data — FAQPage (FAQ rich snippets) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What types of video content do you produce?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We produce a wide range of content — from brand films and social media shorts to full campaign videos, product launches, and documentary-style storytelling. Whatever the format, we tailor it to your goals."
          }
        },
        {
          "@type": "Question",
          "name": "How does the production process work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We follow a streamlined 4-step process: Discovery & Strategy, Creative Development, Production & Filming, and Post-Production & Delivery. We keep you involved at every stage so there are no surprises."
          }
        },
        {
          "@type": "Question",
          "name": "What is your typical turnaround time?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most projects are delivered within 2–4 weeks depending on complexity. Rush delivery is available for time-sensitive campaigns — just let us know your deadline."
          }
        },
        {
          "@type": "Question",
          "name": "Do you work with brands outside your city?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. While we're based locally, we work with brands globally. We handle remote pre-production seamlessly and can travel for shoots when needed."
          }
        },
        {
          "@type": "Question",
          "name": "How much does a typical project cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Every project is unique, so pricing depends on scope, length, and deliverables. We offer transparent quotes after an initial discovery call — no hidden fees."
          }
        },
        {
          "@type": "Question",
          "name": "Can you handle our ongoing content needs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Many of our clients work with us on retainer for ongoing social content, monthly video packages, or campaign rollouts. We scale to fit your needs."
          }
        }
      ]
    }
    </script>

    <!-- ── Structured Data — Service ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "serviceType": "Video Production",
      "provider": {
        "@type": "VideoProductionCompany",
        "name": "Akino Studio",
        "url": "https://akinostudio.com"
      },
      "areaServed": "Worldwide",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Video Production Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Brand Films" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Social Media Shorts" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Campaign Videos" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Video Editing" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Scripting & Storytelling" } }
        ]
      }
    }
    </script>

    <!-- ── Fonts (preconnect for performance) ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />

    <!-- ── Theme Color ── -->
    <meta name="theme-color" content="#03a6af" />

</html>
